<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Namie Nakamura | Resume</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, serif;
      background: #faf8f3;
      color: #1b1b1b;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 64px;
      border-bottom: 1px solid #e9e1d6;
      background: rgba(250, 248, 243, 0.94);
      backdrop-filter: blur(10px);
    }

    .site-name {
      font-size: 31px;
      font-weight: 700;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 34px;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 20px;
      color: #38322d;
    }

    .nav-links a.active {
      color: #1b1b1b;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 80px 40px;
      text-align: center;
    }

    .title {
      font-size: 52px;
      margin-bottom: 20px;
    }

    .subtitle {
      font-family: "Helvetica Neue", sans-serif;
      color: #6b635c;
      margin-bottom: 30px;
    }

    .download-btn {
      display: inline-block;
      margin-bottom: 30px;
      padding: 12px 26px;
      border: 1px solid #1b1b1b;
      font-family: "Helvetica Neue", sans-serif;
      font-size: 14px;
      letter-spacing: 0.05em;
      transition: all 0.2s ease;
    }

    .download-btn:hover {
      background: #1b1b1b;
      color: #faf8f3;
    }

    .pdf-viewer {
      width: 100%;
      height: 950px;
      border: 1px solid #e9e1d6;
      border-radius: 8px;
      overflow: hidden;
    }

    footer {
      text-align: center;
      padding: 92px 40px;
      border-top: 1px solid #e9e1d6;
      background: #f1e9df;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 20px;
      color: #7b7066;
      margin-top: 24px;
    }

    .footer-icons {
      display: flex;
      justify-content: center;
      gap: 34px;
      margin-bottom: 24px;
    }

    .footer-icons a {
      font-size: 35px;
      color: #7b7066;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .footer-icons a:hover {
      color: #1b1b1b;
      transform: translateY(-2px);
    }

    @media (max-width: 900px) {
      nav {
        padding: 24px;
        flex-direction: column;
        gap: 14px;
      }

      .container {
        padding: 60px 20px;
      }

      .title {
        font-size: 36px;
      }

      .pdf-viewer {
        height: 500px;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="site-name">Namie Nakamura</div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/experience.html">Experience</a></li>
      <li><a href="/resume.html" class="active">Resume</a></li>
    </ul>
  </nav>

  <main class="container">
    <h1 class="title">Resume</h1>

   

    <!-- EMBEDDED PDF -->
    <iframe class="pdf-viewer" src="Namie_Nakamura_Resume.pdf"></iframe>
  </main>

  <footer>
    <div class="footer-icons">
      <a href="https://github.com/NakamuraNamie" target="_blank" title="GitHub">
        <i class="fa-brands fa-github"></i>
      </a>
      <a href="https://www.linkedin.com/in/namienakamura" target="_blank" title="LinkedIn">
        <i class="fa-brands fa-linkedin"></i>
      </a>
      <a href="nnkmr1126@gmail.com" title="Email">
        <i class="fa-solid fa-envelope"></i>
      </a>
    </div>
    <p>© 2026 Namie Nakamura</p>
  </footer>
</body>
</html>
